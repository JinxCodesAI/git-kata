# Development docker-compose configuration
# Use this for local development with hot-reload
# Run with: docker compose -f docker-compose.dev.yaml up --build

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gitkata
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      POST: 1
      EXEC: 1
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      SERVICES: 0
      NODES: 0
      BUILD: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  sandbox-base:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: gitkata-sandbox:latest
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "12000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DB_URL}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/anthropic/v1/messages}
      SANDBOX_IMAGE: gitkata-sandbox:latest
      EXERCISES_PATH: /exercises
      SESSIONS_HOST_PATH: ${SESSIONS_HOST_PATH:-/home/adam/projects/git-kata/sessions}
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - ./sessions:/app/sessions
      - ./exercises:/exercises:ro
      - ./tests:/app/tests
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata_dev: