# Development docker-compose configuration
# Use this for local development with hot-reload
# Run with: docker compose -f docker-compose.dev.yaml up --build

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gitkata
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox-base:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: gitkata-sandbox:latest
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "12000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DB_URL}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/anthropic/v1/messages}
      SANDBOX_IMAGE: gitkata-sandbox:latest
      EXERCISES_PATH: /exercises
      SESSIONS_HOST_PATH: ${SESSIONS_HOST_PATH:-/home/adam/projects/git-kata/sessions}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sessions:/app/sessions
      - ./exercises:/exercises:ro
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_dev: